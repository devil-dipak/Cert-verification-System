<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | CertChain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

    .profile-card {
      background: #fff; border-radius: 16px; border: 1px solid #e2e8f0;
      overflow: hidden; max-width: 480px; width: 100%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    .profile-cover {
      height: 100px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      position: relative;
    }

    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700;
      border: 4px solid #fff;
      position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%);
    }

    .profile-body { padding: 48px 28px 28px; text-align: center; }

    .profile-body h4 { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 2px; }

    .role-badge {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 3px 14px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 20px;
    }

    .role-admin { background: #eef2ff; color: #4f46e5; }
    .role-hr { background: #f5f3ff; color: #7c3aed; }
    .role-student { background: #f0fdf4; color: #15803d; }

    .info-list { text-align: left; margin-top: 8px; }
    .info-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; border-bottom: 1px solid #f1f5f9;
      font-size: 14px;
    }
    .info-item:last-child { border-bottom: none; }
    .info-item .label { color: #64748b; font-weight: 500; }
    .info-item .value { color: #0f172a; font-weight: 600; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 16px; font-size: 13px; color: #4f46e5;
      text-decoration: none; font-weight: 500;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="profile-card">
    <div class="profile-cover">
      <div class="profile-avatar" th:text="${#strings.substring(session.activeuser.fname, 0, 1).toUpperCase()}">A</div>
    </div>
    <div class="profile-body">

      <h4 th:text="${session.activeuser.fname + ' ' + session.activeuser.lname}">User Name</h4>

      <span class="role-badge" th:classappend="${session.activeuser.role == 'admin' ? 'role-admin' : (session.activeuser.role == 'HR' ? 'role-hr' : 'role-student')}" th:text="${session.activeuser.role}">ROLE</span>

      <div class="info-list">
        <div class="info-item">
          <span class="label"><i class="bi bi-person me-2"></i>First Name</span>
          <span class="value" th:text="${session.activeuser.fname}">John</span>
        </div>
        <div class="info-item">
          <span class="label"><i class="bi bi-person me-2"></i>Last Name</span>
          <span class="value" th:text="${session.activeuser.lname}">Doe</span>
        </div>
        <div class="info-item">
          <span class="label"><i class="bi bi-envelope me-2"></i>Email</span>
          <span class="value" th:text="${session.activeuser.email}">john@example.com</span>
        </div>
        <div class="info-item">
          <span class="label"><i class="bi bi-shield me-2"></i>Role</span>
          <span class="value" th:text="${session.activeuser.role}">Admin</span>
        </div>
      </div>

      <a th:if="${session.activeuser.role == 'admin'}" href="/home" class="back-link"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
      <a th:if="${session.activeuser.role == 'HR'}" href="/hrHome" class="back-link"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
      <a th:if="${session.activeuser.role == 'student'}" href="/studentHome" class="back-link"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>

    </div>
  </div>
</body>
</html>
