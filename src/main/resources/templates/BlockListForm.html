<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block List | CertChain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 250px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); padding: 0; z-index: 100; overflow-y: auto; }
    .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand h3 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
    .sidebar-brand small { color: #94a3b8; font-size: 12px; }
    .sidebar-nav { padding: 12px 0; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.06); color: #fff; border-left-color: #4f46e5; }
    .sidebar-nav a i { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-nav .section-label { padding: 16px 20px 6px; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .main-content { margin-left: 250px; min-height: 100vh; }
    .topbar { background: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 99; }
    .topbar h4 { font-size: 18px; font-weight: 600; color: #0f172a; margin: 0; }
    .topbar .actions { display: flex; gap: 8px; }
    .content { padding: 28px 32px; }
    .table-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
    .table-card .card-head { padding: 20px 28px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; display: flex; align-items: center; justify-content: space-between; }
    .table-card .card-head h5 { font-size: 16px; font-weight: 600; color: #0f172a; margin: 0; }
    .table-card .card-body { padding: 0; }
    .table { margin: 0; }
    .table thead { background: #f1f5f9; }
    .table thead th { font-size: 12px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; padding: 14px 16px; border-bottom: 2px solid #e2e8f0; }
    .table tbody td { font-size: 13px; color: #334155; padding: 12px 16px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }
    .table tbody tr:hover { background: #f8fafc; }
    .table-wrapper { overflow-x: auto; }
    .table { table-layout: auto; width: 100%; }
    th { position: relative; }
    .resizer { position: absolute; right: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; background: transparent; z-index: 1; }
    .resizer:hover, .resizer.resizing { background: #4f46e5; }
    .hash-cell { font-family: 'Courier New', monospace; font-size: 11px; word-break: break-all; white-space: normal; }
    .badge-hash { background: #eef2ff; color: #4f46e5; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-family: 'Courier New', monospace; }
    .btn-sm { height: 32px; font-size: 12px; border-radius: 8px; padding: 0 14px; }
    .btn-outline-primary { border-color: #e2e8f0; color: #4f46e5; }
    .btn-outline-primary:hover { background: #4f46e5; border-color: #4f46e5; color: #fff; }
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-brand h3, .sidebar-brand small, .sidebar-nav a span, .sidebar-nav .section-label { display: none; }
      .sidebar-nav a { justify-content: center; padding: 14px; border-left: none; }
      .main-content { margin-left: 60px; }
      .content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h3>CertChain</h3>
    <small>Admin Panel</small>
  </div>
  <div class="sidebar-nav">
    <div class="section-label">Main</div>
    <a href="/home"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
    <a href="/block/add"><i class="bi bi-link-45deg"></i><span>Add Block</span></a>
    <a href="/block/list" class="active"><i class="bi bi-list-ul"></i><span>Blocks</span></a>
    <div class="section-label">Account</div>
    <a href="/logout"><i class="bi bi-box-arrow-left"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <h4>Block List</h4>
    <div class="actions">
      <a href="/block/excel" class="btn btn-outline-primary btn-sm"><i class="bi bi-file-earmark-excel me-1"></i>Excel</a>
      <a href="/block/pdf" class="btn btn-outline-primary btn-sm"><i class="bi bi-file-earmark-pdf me-1"></i>PDF</a>
    </div>
  </div>
  <div class="content">
    <div class="table-card">
      <div class="card-head">
        <h5><i class="bi bi-list-ul me-2"></i>All Blocks</h5>
        <span class="badge-hash">[[${#lists.size(blcList)}]] block(s)</span>
      </div>
      <div class="card-body">
        <div class="table-wrapper">
        <table class="table" id="blockTable">
          <thead>
            <tr>
              <th>Previous Hash</th>
              <th>Current Hash</th>
              <th>Data</th>
              <th>Created At</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="d :${blcList}">
              <td><span class="hash-cell" th:title="${d.previousHash}">[[${d.previousHash}]]</span></td>
              <td><span class="hash-cell" th:title="${d.currentHash}">[[${d.currentHash}]]</span></td>
              <td><span class="hash-cell" th:title="${d.data}">[[${d.data}]]</span></td>
              <td>[[${d.createdAt}]]</td>
              <td>
                <a th:href="@{/block/edit(id=${d.id})}" class="btn btn-outline-primary btn-sm me-1"><i class="bi bi-pencil"></i></a>
                <a th:href="@{/block/delete(id=${d.id})}" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></a>
              </td>
            </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('#blockTable th').forEach(th => {
    const resizer = document.createElement('div');
    resizer.className = 'resizer';
    th.appendChild(resizer);
    let startX, startWidth;
    resizer.addEventListener('mousedown', e => {
      startX = e.clientX;
      startWidth = th.offsetWidth;
      resizer.classList.add('resizing');
      document.body.style.cursor = 'col-resize';
      document.addEventListener('mousemove', doDrag);
      document.addEventListener('mouseup', stopDrag);
    });
    function doDrag(e) {
      const w = startWidth + (e.clientX - startX);
      if (w > 40) th.style.width = w + 'px';
    }
    function stopDrag() {
      resizer.classList.remove('resizing');
      document.body.style.cursor = '';
      document.removeEventListener('mousemove', doDrag);
      document.removeEventListener('mouseup', stopDrag);
    }
  });
</script>
</body>
</html>
