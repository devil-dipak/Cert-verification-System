<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Certificate | CertChain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }

    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 250px;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      padding: 0; z-index: 100; overflow-y: auto;
    }
    .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand h3 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
    .sidebar-brand small { color: #94a3b8; font-size: 12px; }
    .sidebar-nav { padding: 12px 0; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 12px; padding: 11px 20px;
      color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500;
      transition: all 0.2s; border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.06); color: #fff; border-left-color: #4f46e5; }
    .sidebar-nav a i { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-nav .section-label { padding: 16px 20px 6px; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

    .main-content { margin-left: 250px; min-height: 100vh; }

    .topbar {
      background: #fff; padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 99;
    }
    .topbar h4 { font-size: 18px; font-weight: 600; color: #0f172a; margin: 0; }

    .user-badge {
      display: flex; align-items: center; gap: 10px;
      background: #f1f5f9; padding: 6px 14px 6px 10px; border-radius: 20px; font-size: 13px; color: #334155;
    }
    .user-badge .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
    }

    .content { padding: 28px 32px; }

    .form-card {
      background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden;
      max-width: 700px;
    }
    .form-card .card-head {
      padding: 20px 28px; border-bottom: 1px solid #e2e8f0;
      background: #f8fafc;
    }
    .form-card .card-head h5 { font-size: 16px; font-weight: 600; color: #0f172a; margin: 0; }
    .form-card .card-head p { font-size: 13px; color: #64748b; margin: 4px 0 0; }

    .form-body { padding: 28px; }
    .form-body label { font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 5px; }
    .form-body input, .form-body select {
      width: 100%; height: 44px; padding: 0 14px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; color: #0f172a; background: #f8fafc;
      transition: all 0.2s; outline: none;
    }
    .form-body input:focus, .form-body select:focus { border-color: #4f46e5; background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .form-body .form-group { margin-bottom: 18px; }

    .btn-submit {
      height: 46px; background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer; padding: 0 32px;
      transition: all 0.25s;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(79,70,229,0.35); }

    .success-banner {
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px;
      padding: 16px 20px; margin-bottom: 24px;
    }
    .hash-text { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 12px; word-break: break-all; color: #15803d; font-weight: 600; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-brand h3, .sidebar-brand small, .sidebar-nav a span, .sidebar-nav .section-label { display: none; }
      .sidebar-nav a { justify-content: center; padding: 14px; border-left: none; }
      .main-content { margin-left: 60px; }
      .content { padding: 20px 16px; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h3>CertChain</h3>
    <small>Admin Panel</small>
  </div>
  <div class="sidebar-nav">
    <div class="section-label">Main</div>
    <a href="/home"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
    <a href="/certificate/add" class="active"><i class="bi bi-file-earmark-plus"></i><span>Issue Certificate</span></a>
    <a href="/certificate/list"><i class="bi bi-files"></i><span>All Certificates</span></a>
    <div class="section-label">Blockchain</div>
    <a href="/block/explorer"><i class="bi bi-link-45deg"></i><span>Blockchain Explorer</span></a>
    <div class="section-label">Account</div>
    <a href="/logout"><i class="bi bi-box-arrow-left"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <h4>Issue Certificate</h4>
    <div class="user-badge">
      <div class="avatar">A</div>
      <span>Admin</span>
    </div>
  </div>

  <div class="content">

    <div class="form-card">
      <div class="card-head">
        <h5><i class="bi bi-file-earmark-plus me-2"></i>New Certificate</h5>
        <p>Fill in the details below. The blockchain hash and QR code will be generated automatically.</p>
      </div>

      <div class="form-body">

        <div th:if="${success}" class="success-banner">
          <div class="d-flex align-items-start gap-3">
            <div style="font-size:24px;"><i class="bi bi-check-circle-fill" style="color:#15803d;"></i></div>
            <div style="flex:1;">
              <strong style="color:#15803d;" th:text="${success}">Success</strong>
              <div style="font-size:13px;color:#334155;margin-top:4px;">
                Certificate ID: <strong th:text="${certId}"></strong><br>
                Blockchain Hash: <span class="hash-text" th:text="${hash}"></span>
              </div>
              <div class="mt-2">
                <img th:src="@{/certificate/qr/{id}(id=${certId})}" alt="QR Code" style="width:120px;height:120px;border:1px solid #e2e8f0;border-radius:8px;">
              </div>
            </div>
          </div>
        </div>

        <form action="/certificate/add" method="POST">
          <div class="form-group">
            <label for="studentName">Student Name</label>
            <input type="text" name="studentName" id="studentName" placeholder="e.g. John Doe" required>
          </div>
          <div class="form-group">
            <label for="courseName">Course Name</label>
            <input type="text" name="courseName" id="courseName" placeholder="e.g. Computer Science" required>
          </div>
          <div class="form-group">
            <label for="department">Department / Faculty</label>
            <select name="department" id="department" class="form-control" required>
              <option value="">-- Select Department --</option>
              <option th:each="dept : ${departments}" th:value="${dept.deptName}" th:text="${dept.deptName}"></option>
            </select>
          </div>
          <div class="form-group">
            <label for="issuer">Issued By</label>
            <input type="text" name="issuer" id="issuer" placeholder="e.g. University Name" required>
          </div>
          <div class="form-group">
            <label for="issueDate">Issue Date</label>
            <input type="date" name="issueDate" id="issueDate" required>
          </div>
          <div class="text-end mt-4">
            <button type="submit" class="btn-submit px-4">
              <i class="bi bi-link-45deg me-2"></i>Issue & Record on Blockchain
            </button>
          </div>
        </form>

      </div>
    </div>

  </div>
</div>

</body>
</html>
