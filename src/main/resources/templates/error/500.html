<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff512f,#dd2476);
            color:white;
        }

        .container{
            text-align:center;
            width:80%;
        }

        h1{
            font-size:120px;
            margin-bottom:10px;
        }

        h2{
            font-size:35px;
            margin-bottom:15px;
        }

        p{
            font-size:18px;
            margin-bottom:25px;
        }

        a{
            text-decoration:none;
            background:white;
            color:#dd2476;
            padding:12px 25px;
            border-radius:30px;
            font-weight:bold;
            transition:0.3s;
        }

        a:hover{
            background:#dd2476;
            color:white;
            border:2px solid white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>500</h1>
        <h2>Internal Server Error</h2>
        <p>Something went wrong on our server. Please try again later.</p>

        <a href="/">Return Home</a>
    </div>

</body>
</html>
