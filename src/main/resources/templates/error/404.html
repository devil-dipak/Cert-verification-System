<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            color:white;
        }

        .container{
            text-align:center;
        }

        h1{
            font-size:120px;
            margin-bottom:10px;
        }

        h2{
            font-size:35px;
            margin-bottom:15px;
        }

        p{
            font-size:18px;
            margin-bottom:25px;
        }

        a{
            text-decoration:none;
            background:white;
            color:#0077ff;
            padding:12px 25px;
            border-radius:30px;
            font-weight:bold;
            transition:0.3s;
        }

        a:hover{
            background:#0077ff;
            color:white;
            border:2px solid white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Oops! The page you are looking for does not exist.</p>

        <a href="/">Go Back Home</a>
    </div>

</body>
</html>
