<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments | CertChain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 250px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); padding: 0; z-index: 100; overflow-y: auto; }
    .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand h3 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
    .sidebar-brand small { color: #94a3b8; font-size: 12px; }
    .sidebar-nav { padding: 12px 0; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.06); color: #fff; border-left-color: #4f46e5; }
    .sidebar-nav a i { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-nav .section-label { padding: 16px 20px 6px; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .main-content { margin-left: 250px; min-height: 100vh; }
    .topbar { background: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 99; }
    .topbar h4 { font-size: 18px; font-weight: 600; color: #0f172a; margin: 0; }
    .content { padding: 28px 32px; }
    .table-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
    .table-card .card-head { padding: 18px 24px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; background: #f8fafc; }
    .table-card .card-head h5 { font-size: 15px; font-weight: 600; color: #0f172a; margin: 0; }
    .table > :not(caption) > * > * { padding: 12px 16px; font-size: 13px; color: #334155; vertical-align: middle; }
    .table th { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    .table td { border-bottom: 1px solid #f1f5f9; }
    .table tr:last-child td { border-bottom: none; }
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-brand h3, .sidebar-brand small, .sidebar-nav a span, .sidebar-nav .section-label { display: none; }
      .sidebar-nav a { justify-content: center; padding: 14px; border-left: none; }
      .main-content { margin-left: 60px; }
      .content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h3>CertChain</h3>
    <small>Admin Panel</small>
  </div>
  <div class="sidebar-nav">
    <div class="section-label">Main</div>
    <a href="/home"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
    <a href="/department/add"><i class="bi bi-building-add"></i><span>Add Department</span></a>
    <a href="/department/list" class="active"><i class="bi bi-building"></i><span>Departments</span></a>
    <div class="section-label">Account</div>
    <a href="/logout"><i class="bi bi-box-arrow-left"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <h4>Departments</h4>
    <div>
      <a href="/department/add" class="btn btn-primary btn-sm rounded-pill px-3">
        <i class="bi bi-plus-lg me-1"></i>Add
      </a>
      <a href="/department/excel" class="btn btn-outline-success btn-sm rounded-pill px-3 ms-2">
        <i class="bi bi-file-earmark-excel me-1"></i>Excel
      </a>
      <a href="/department/pdf" class="btn btn-outline-danger btn-sm rounded-pill px-3 ms-2">
        <i class="bi bi-filetype-pdf me-1"></i>PDF
      </a>
    </div>
  </div>
  <div class="content">
    <div class="table-card">
      <div class="card-head">
        <h5><i class="bi bi-building me-2"></i>All Departments</h5>
        <span class="text-muted" style="font-size:13px;" th:text="${#lists.size(deptList) + ' records'}">0 records</span>
      </div>
      <div class="table-responsive">
        <table class="table table-borderless mb-0">
          <thead>
            <tr>
              <th>ID</th>
              <th>Department Name</th>
              <th>Phone</th>
              <th>Head (HoD)</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="d : ${deptList}">
              <td th:text="${d.deptId}">1</td>
              <td><strong th:text="${d.deptName}">Name</strong></td>
              <td th:text="${d.deptPhone}">Phone</td>
              <td th:text="${d.deptHead}">Head</td>
              <td>
                <a th:href="@{/department/edit(id=${d.deptId})}" class="btn btn-sm btn-outline-warning rounded-pill px-2" title="Edit">
                  <i class="bi bi-pencil"></i>
                </a>
                <a th:href="@{/department/delete(id=${d.deptId})}" class="btn btn-sm btn-outline-danger rounded-pill px-2" title="Delete" onclick="return confirm('Delete this department?')">
                  <i class="bi bi-trash"></i>
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
