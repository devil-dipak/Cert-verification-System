<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blockchain Explorer | CertChain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }

    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 250px;
      background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
      padding: 0; z-index: 100; overflow-y: auto;
    }
    .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand h3 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
    .sidebar-brand small { color: #94a3b8; font-size: 12px; }
    .sidebar-nav { padding: 12px 0; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.06); color: #fff; border-left-color: #4f46e5; }
    .sidebar-nav a i { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-nav .section-label { padding: 16px 20px 6px; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .main-content { margin-left: 250px; min-height: 100vh; }

    .topbar { background: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
    .topbar h4 { font-size: 18px; font-weight: 600; color: #0f172a; margin: 0; }

    .content { padding: 28px 32px; }

    .explorer-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
    .explorer-card .card-head { padding: 18px 24px; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; background: #f8fafc; }
    .explorer-card .card-head h5 { font-size: 15px; font-weight: 600; color: #0f172a; margin: 0; }

    .block-chain { display: flex; flex-direction: column; gap: 0; }

    .block-node {
      padding: 16px 24px; border-bottom: 1px solid #f1f5f9;
      display: flex; align-items: flex-start; gap: 16px;
      transition: background 0.15s;
    }
    .block-node:hover { background: #f8fafc; }
    .block-node:last-child { border-bottom: none; }

    .block-index {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      background: #eef2ff; color: #4f46e5;
    }
    .block-node:first-child .block-index { background: #f0fdf4; color: #15803d; }

    .block-content { flex: 1; min-width: 0; }
    .block-content .field { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .block-content .field:last-child { margin-bottom: 0; }
    .block-content .field-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.3px; width: 60px; flex-shrink: 0; }
    .block-content .field-value { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 11px; color: #334155; word-break: break-all; }
    .block-content .field-value.data-value { font-family: inherit; font-weight: 500; color: #0f172a; }

    .chain-link {
      display: flex; align-items: center; justify-content: center;
      color: #94a3b8; font-size: 18px; padding: 4px 0;
    }

    .badge-safe { background: #dcfce7; color: #15803d; font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 600; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-brand h3, .sidebar-brand small, .sidebar-nav a span, .sidebar-nav .section-label { display: none; }
      .sidebar-nav a { justify-content: center; padding: 14px; border-left: none; }
      .main-content { margin-left: 60px; }
      .content { padding: 20px 16px; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h3>CertChain</h3>
    <small>Explorer</small>
  </div>
  <div class="sidebar-nav">
    <div class="section-label">Blockchain</div>
    <a href="/block/explorer" class="active"><i class="bi bi-link-45deg"></i><span>Blockchain Explorer</span></a>
    <a href="/block/list"><i class="bi bi-list-columns"></i><span>All Blocks</span></a>
    <div class="section-label">Account</div>
    <a href="/profile"><i class="bi bi-person"></i><span>Profile</span></a>
    <a href="/logout"><i class="bi bi-box-arrow-left"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <h4><i class="bi bi-link-45deg me-2"></i>Blockchain Explorer</h4>
    <span class="badge-safe"><i class="bi bi-check-circle me-1"></i>Chain Verified</span>
  </div>

  <div class="content">
    <div class="explorer-card">
      <div class="card-head">
        <h5>Blocks <span class="text-muted" style="font-weight:400;font-size:13px;" th:text="'(' + ${#lists.size(blocks)} + ' total)'">(0 total)</span></h5>
      </div>
      <div class="block-chain">
        <th:block th:each="block, iter : ${blocks}">
          <div class="block-node">
            <div class="block-index" th:text="${iter.index}">0</div>
            <div class="block-content">
              <div class="field">
                <span class="field-label">Hash</span>
                <span class="field-value" th:text="${block.currentHash}">abc123</span>
              </div>
              <div class="field">
                <span class="field-label">Prev</span>
                <span class="field-value" th:text="${block.previousHash}">0</span>
              </div>
              <div class="field">
                <span class="field-label">Data</span>
                <span class="field-value data-value" th:text="${block.data}">data</span>
              </div>
              <div class="field">
                <span class="field-label">Time</span>
                <span class="field-value" style="font-family:inherit;font-size:12px;color:#94a3b8;" th:text="${#temporals.format(block.createdAt, 'yyyy-MM-dd')}">date</span>
              </div>
            </div>
          </div>
          <div class="chain-link" th:if="${!iter.last}">
            <i class="bi bi-arrow-down-circle"></i>
          </div>
        </th:block>
        <div th:if="${#lists.isEmpty(blocks)}" style="padding:40px;text-align:center;color:#94a3b8;">
          <i class="bi bi-inbox" style="font-size:32px;display:block;margin-bottom:8px;"></i>
          No blocks in the chain yet
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
