<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Block | CertChain</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; }
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 250px; background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); padding: 0; z-index: 100; overflow-y: auto; }
    .sidebar-brand { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand h3 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
    .sidebar-brand small { color: #94a3b8; font-size: 12px; }
    .sidebar-nav { padding: 12px 0; }
    .sidebar-nav a { display: flex; align-items: center; gap: 12px; padding: 11px 20px; color: #cbd5e1; text-decoration: none; font-size: 14px; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
    .sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.06); color: #fff; border-left-color: #4f46e5; }
    .sidebar-nav a i { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-nav .section-label { padding: 16px 20px 6px; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
    .main-content { margin-left: 250px; min-height: 100vh; }
    .topbar { background: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 99; }
    .topbar h4 { font-size: 18px; font-weight: 600; color: #0f172a; margin: 0; }
    .content { padding: 28px 32px; }
    .form-card { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; max-width: 600px; }
    .form-card .card-head { padding: 20px 28px; border-bottom: 1px solid #e2e8f0; background: #f8fafc; }
    .form-card .card-head h5 { font-size: 16px; font-weight: 600; color: #0f172a; margin: 0; }
    .form-body { padding: 28px; }
    .form-body label { font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 5px; }
    .form-body input, .form-body textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; color: #0f172a; background: #f8fafc; transition: all 0.2s; outline: none; }
    .form-body input:focus, .form-body textarea:focus { border-color: #4f46e5; background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,0.12); }
    .form-body .form-group { margin-bottom: 16px; }
    .btn-primary { background: #4f46e5; border: none; border-radius: 10px; height: 42px; font-weight: 600; }
    .btn-primary:hover { background: #4338ca; }
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-brand h3, .sidebar-brand small, .sidebar-nav a span, .sidebar-nav .section-label { display: none; }
      .sidebar-nav a { justify-content: center; padding: 14px; border-left: none; }
      .main-content { margin-left: 60px; }
      .content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">
    <h3>CertChain</h3>
    <small>Admin Panel</small>
  </div>
  <div class="sidebar-nav">
    <div class="section-label">Main</div>
    <a href="/home"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
    <a href="/block/add" class="active"><i class="bi bi-link-45deg"></i><span>Add Block</span></a>
    <a href="/block/list"><i class="bi bi-list-ul"></i><span>Blocks</span></a>
    <div class="section-label">Account</div>
    <a href="/logout"><i class="bi bi-box-arrow-left"></i><span>Logout</span></a>
  </div>
</div>

<div class="main-content">
  <div class="topbar">
    <h4>Add Block</h4>
  </div>
  <div class="content">
    <div class="form-card">
      <div class="card-head">
        <h5><i class="bi bi-link-45deg me-2"></i>New Block</h5>
      </div>
      <div class="form-body">
        <form action="/block/add" method="post">
          <div class="form-group">
            <label for="previousHash">Previous Hash</label>
            <input type="text" name="previousHash" id="previousHash" class="form-control" placeholder="Enter previous block hash" required>
          </div>
          <div class="form-group">
            <label for="currentHash">Current Hash</label>
            <input type="text" name="currentHash" id="currentHash" class="form-control" placeholder="Enter current block hash" required>
          </div>
          <div class="form-group">
            <label for="data">Data</label>
            <textarea name="data" id="data" class="form-control" rows="3" placeholder="Certificate hash or transaction data" required></textarea>
          </div>
          <div class="text-end mt-4">
            <a href="/block/list" class="btn btn-outline-secondary rounded-pill px-3 me-2">Cancel</a>
            <button type="submit" class="btn btn-primary rounded-pill px-4">
              <i class="bi bi-check-lg me-1"></i>Add Block
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
